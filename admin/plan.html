<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<script>
  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>

<title>Admin · Blueprint Generator — Bit by Bit Pedagogy</title>
<link rel="stylesheet" href="/styles/b3.css" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  .doc{background:#fdfcf8;color:#1a2433;border-radius:8px;padding:48px 56px;box-shadow:0 10px 40px rgba(0,0,0,0.4);font-family:"Source Serif 4",Georgia,serif;font-size:15px;line-height:1.65}
  @media (max-width:720px){.doc{padding:28px 22px}}
  .doc h1{font-family:"Source Serif 4",serif;font-size:40px;text-align:center;color:#1c3552;margin:8px 0 4px}
  .doc h2{font-family:"Source Serif 4",serif;color:#1c3552;font-size:22px;margin:32px 0 12px;padding-bottom:6px;border-bottom:2px solid #1c3552}
  .doc h3{color:#1f7a5a;font-size:17px;margin:22px 0 8px}
  .doc h4{color:#c4881f;font-size:15px;margin:16px 0 6px}
  .doc strong{color:#1c3552}
  .doc em{color:#1f7a5a}
  .doc hr{border:none;border-top:2px solid #c4881f;margin:24px 0}
  .doc blockquote{border-left:3px solid #1f7a5a;padding:4px 14px;margin:14px 0;color:#1f7a5a;font-style:italic;background:#f1f7f4;border-radius:0 4px 4px 0}
  .doc ul{padding-left:22px}
  .doc li{margin-bottom:6px}
  .doc a{color:#1f7a5a}
  .gate{max-width:420px;margin:80px auto;padding:32px;background:var(--card);border:1px solid var(--line);border-radius:8px;text-align:center}
  .resources{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:var(--bg-2);border:1px solid var(--line);border-radius:999px;font-size:12px;color:var(--ink);cursor:pointer;text-transform:none;letter-spacing:0;margin:0}
  .chip input{width:auto;margin:0}
  .grid-2{display:grid;gap:14px;grid-template-columns:1fr 1fr}
  .grid-3{display:grid;gap:14px;grid-template-columns:1fr 1fr 1fr}
  @media (max-width:720px){.grid-2,.grid-3{grid-template-columns:1fr}}
  @media print{.site-header,.site-footer,#admin-form,#status,.doc-toolbar,h1.page-title,p.page-sub,.gate{display:none!important}.doc{box-shadow:none;padding:0}}
</style>
</head>
<body>
<header class="site-header">
  <a href="/" class="logo">B<span>3</span> &nbsp; BIT BY BIT <span>PEDAGOGY</span></a>
  <nav><a href="/">Home</a><a href="/method/">Method</a><a href="/bits/">Bits</a></nav>
</header>

<main class="shell">
  <div id="gate-wrap" class="gate" style="display:none">
    <h2 style="border:none;margin-top:0">Admin only</h2>
    <p style="color:var(--mute);font-size:13px;margin-bottom:18px">This is the full blueprint generator. Enter your admin token to continue.</p>
    <input type="password" id="gate-input" placeholder="Admin token" />
    <button class="primary" id="gate-btn" style="margin-top:12px;width:100%">Unlock</button>
    <div id="gate-msg" style="margin-top:10px;color:var(--red);font-size:12px;min-height:14px"></div>
  </div>

  <div id="app" style="display:none">
    <div class="kicker">Admin · Coach tool</div>
    <h1 class="page-title">Personalised Blueprint Generator</h1>
    <p class="page-sub" style="color:var(--mute)">Full 9-section Bri-style blueprint. ~$0.11 per generation. <button class="ghost" id="logout-btn" style="margin-left:10px">Lock</button></p>

    <form id="admin-form" style="display:grid;gap:18px">
      <div class="grid-2">
        <div><label>Student name</label><input name="name" required /></div>
        <div><label>Tutor (you)</label><input name="tutor" placeholder="Your name" /></div>
      </div>

      <div class="grid-3">
        <div><label>Exam</label><select name="exam" required><option>USMLE Step 1</option><option>USMLE Step 2 CK</option><option>USMLE Step 3</option><option>COMLEX Level 1</option><option>COMLEX Level 2 CE</option><option>NBME Shelf</option></select></div>
        <div><label>Stage</label><select name="stage"><option>M1</option><option>M2</option><option>M3</option><option>M4</option><option>Gap year</option><option>Post-graduate / IMG</option></select></div>
        <div><label>School type</label><select name="schoolType"><option>US MD</option><option>US DO</option><option>US-IMG</option><option>FMG / IMG</option></select></div>
      </div>

      <div class="grid-3">
        <div><label>Weeks of prep</label><input name="weeks" type="number" min="1" max="52" value="8" required /></div>
        <div><label>Target score</label><input name="target" required /></div>
        <div><label>Attempt</label><select name="attempt"><option>First attempt</option><option>Retake</option></select></div>
      </div>

      <div><label>Baseline (recent NBME, UWorld %, last SA)</label><input name="baseline" /></div>
      <div><label>How they study (their own words)</label><textarea name="studyStyle"></textarea></div>

      <div class="grid-2">
        <div><label>Learning modality</label><select name="modality"><option>Active retrieval (questions first)</option><option>Visual (Sketchy, diagrams, videos)</option><option>Reading / text-heavy</option><option>Auditory / lecture-based</option><option>Mixed</option></select></div>
        <div><label>Test-taking confidence</label><select name="confidence"><option>Strong — trusts first instinct</option><option>Inconsistent</option><option>Weak — second-guesses, runs out of time</option></select></div>
      </div>

      <div><label>Schedule reality (wake, caffeine, gym, distractions, downtime)</label><textarea name="schedule"></textarea></div>

      <div>
        <label>Resources they have</label>
        <div class="resources">
          <label class="chip"><input type="checkbox" name="resources" value="UWorld" checked> UWorld</label>
          <label class="chip"><input type="checkbox" name="resources" value="NBME forms" checked> NBME forms</label>
          <label class="chip"><input type="checkbox" name="resources" value="Pathoma"> Pathoma</label>
          <label class="chip"><input type="checkbox" name="resources" value="Sketchy"> Sketchy</label>
          <label class="chip"><input type="checkbox" name="resources" value="Mehlman PDFs"> Mehlman</label>
          <label class="chip"><input type="checkbox" name="resources" value="OnlineMedEd"> OME</label>
          <label class="chip"><input type="checkbox" name="resources" value="Dirty Medicine"> Dirty Medicine</label>
          <label class="chip"><input type="checkbox" name="resources" value="AMBOSS"> AMBOSS</label>
          <label class="chip"><input type="checkbox" name="resources" value="Anki"> Anki</label>
          <label class="chip"><input type="checkbox" name="resources" value="First Aid"> First Aid</label>
          <label class="chip"><input type="checkbox" name="resources" value="Boards & Beyond"> B&B</label>
          <label class="chip"><input type="checkbox" name="resources" value="Divine Intervention"> Divine</label>
        </div>
      </div>

      <div class="grid-2">
        <div><label>Weak systems</label><input name="weakSystems" /></div>
        <div><label>Strong systems</label><input name="strongSystems" /></div>
      </div>

      <div><label>What is at stake</label><textarea name="stake"></textarea></div>

      <div class="grid-2">
        <div><label>Burnout level</label><select name="burnout"><option>Low — fresh</option><option>Moderate</option><option>High — running on fumes</option></select></div>
        <div><label>Anything else</label><input name="notes" /></div>
      </div>

      <button type="submit" class="primary" id="submit-btn">Generate blueprint →</button>
      <div id="status" style="color:var(--mute);font-size:13px;min-height:18px"></div>
    </form>

    <div id="doc-wrap" style="display:none;margin-top:32px">
      <div class="doc-toolbar" style="display:flex;justify-content:flex-end;gap:10px;margin-bottom:12px">
        <button class="ghost" id="btn-print">Print / PDF</button>
        <button class="ghost" id="btn-copy">Copy markdown</button>
        <button class="ghost" id="btn-new">Clear</button>
      </div>
      <article class="doc" id="doc"></article>
    </div>
  </div>
</main>

<footer class="site-footer">Bit by Bit Pedagogy · Admin</footer>

<script>
const TOKEN_KEY = 'b3_admin_token';
const gateWrap = document.getElementById('gate-wrap');
const app = document.getElementById('app');
const gateBtn = document.getElementById('gate-btn');
const gateInput = document.getElementById('gate-input');
const gateMsg = document.getElementById('gate-msg');

function showApp() { gateWrap.style.display='none'; app.style.display='block'; }
function showGate() { gateWrap.style.display='block'; app.style.display='none'; gateInput.focus(); }

if (localStorage.getItem(TOKEN_KEY)) showApp(); else showGate();

gateBtn.addEventListener('click', () => {
  const v = gateInput.value.trim();
  if (!v) { gateMsg.textContent = 'Enter the token.'; return; }
  localStorage.setItem(TOKEN_KEY, v);
  gateMsg.textContent = '';
  showApp();
});
gateInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') gateBtn.click(); });
document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem(TOKEN_KEY);
  showGate();
});

const form = document.getElementById('admin-form');
const btn = document.getElementById('submit-btn');
const statusEl = document.getElementById('status');
const docWrap = document.getElementById('doc-wrap');
const docEl = document.getElementById('doc');
let lastMd = '';

function collect() {
  const fd = new FormData(form);
  const obj = {};
  for (const [k, v] of fd.entries()) {
    if (k === 'resources') { obj.resources = obj.resources || []; obj.resources.push(v); }
    else obj[k] = v;
  }
  return obj;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const token = localStorage.getItem(TOKEN_KEY) || '';
  btn.disabled = true; lastMd = ''; docEl.innerHTML = '';
  docWrap.style.display = 'block';
  statusEl.textContent = 'Generating…';
  docWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });

  try {
    const r = await fetch('/api/plan', {
      method: 'POST',
      headers: { 'content-type':'application/json', 'x-admin-token': token },
      body: JSON.stringify(collect()),
    });
    if (r.status === 401) {
      localStorage.removeItem(TOKEN_KEY);
      throw new Error('Bad token. Locked again.');
    }
    if (!r.ok) {
      let msg = 'Generation failed';
      try { const j = await r.json(); msg = j.error || msg; } catch {}
      throw new Error(msg);
    }
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let lastRender = 0;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      lastMd += decoder.decode(value, { stream: true });
      const now = Date.now();
      if (now - lastRender > 120) {
        docEl.innerHTML = marked.parse(lastMd);
        statusEl.textContent = 'Writing…';
        lastRender = now;
      }
    }
    docEl.innerHTML = marked.parse(lastMd);
    statusEl.textContent = 'Done.';
  } catch (err) {
    statusEl.textContent = 'Error: ' + err.message;
    if (/Bad token/.test(err.message)) showGate();
  } finally { btn.disabled = false; }
});

document.getElementById('btn-print').addEventListener('click', () => window.print());
document.getElementById('btn-copy').addEventListener('click', async () => {
  try { await navigator.clipboard.writeText(lastMd); statusEl.textContent='Copied.'; }
  catch { statusEl.textContent='Copy failed.'; }
});
document.getElementById('btn-new').addEventListener('click', () => {
  docWrap.style.display='none'; form.reset(); statusEl.textContent='';
  window.scrollTo({ top:0, behavior:'smooth' });
});
</script>
</body>
</html>
